<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MongoDB OAuth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .oauth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .google-btn {
            background-color: #DB4437;
        }

        .github-btn {
            background-color: #333;
        }

        .facebook-btn {
            background-color: #4267B2;
        }

        .icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            color: #999;
        }

        .divider::before {
            content: '';
            display: inline-block;
            width: 45%;
            height: 1px;
            background-color: #ddd;
            vertical-align: middle;
            margin-right: 10px;
        }

        .divider::after {
            content: '';
            display: inline-block;
            width: 45%;
            height: 1px;
            background-color: #ddd;
            vertical-align: middle;
            margin-left: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MongoDB OAuth</h1>
        
        <div class="oauth-buttons">
            <a href="/auth/google" class="oauth-btn google-btn">
                <span>🔐</span> Sign in with Google
            </a>
            <a href="/auth/github" class="oauth-btn github-btn">
                <span>🐙</span> Sign in with GitHub
            </a>
            <a href="/auth/facebook" class="oauth-btn facebook-btn">
                <span>f</span> Sign in with Facebook
            </a>
        </div>

        <div class="divider">OR</div>

        <p style="text-align: center; color: #999; font-size: 0.9em;">
            Secure OAuth authentication powered by MongoDB
        </p>
    </div>
</body>
</html>
